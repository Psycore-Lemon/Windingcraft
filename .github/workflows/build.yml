name: Build

on:
  push:
    branches: [main, Cube]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release -j

      - name: Package
        run: |
          mkdir package
          copy build\Release\Windingcraft.exe package\
          xcopy /E /I shaders package\shaders
          xcopy /E /I assets package\assets
          copy config.json package\

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windingcraft-Windows
          path: package/

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libxrandr-dev libxinerama-dev libxcursor-dev libxi-dev libxext-dev libwayland-dev libxkbcommon-dev

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Package
        run: |
          mkdir package
          cp build/Windingcraft package/
          cp -r shaders package/
          cp -r assets package/
          cp config.json package/

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Windingcraft-Linux
          path: package/
